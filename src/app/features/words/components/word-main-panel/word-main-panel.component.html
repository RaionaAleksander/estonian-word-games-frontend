<app-search-panel class="main-panel">

  <!-- FILTER CONTAINER -->
  <app-filter-container
    [filters]="filters"
    (filtersChange)="updateFilters($event)"
  />

  <!-- SORT CONTAINER -->
  <app-sort-container
    [sort]="sort"
    (sortChange)="updateSort($event)"
  />

  <!-- PAGE SIZE CONTAINER -->
  <app-pagination-container
    [pageSize]="pageSize"
    (pageSizeChange)="updatePageSize($event)"
  />

  <!-- ACTIONS -->
  <app-panel-actions
    primaryLabel="Apply All"
    secondaryLabel="Reset All"
    (primaryClick)="applyAll()"
    (secondaryClick)="resetAll()"
  />

</app-search-panel>
