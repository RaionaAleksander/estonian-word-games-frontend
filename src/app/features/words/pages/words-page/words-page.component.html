<section class="p-8">
  <h1 class="mb-4 text-3xl font-bold">
    Eesti sõnad
  </h1>

  <app-word-main-panel
    [filters]="query.filters"
    [sort]="query.sort"
    [pageSize]="{ size: query.size }"
    (applyAllEvent)="onQueryChange($event)"
    (resetAllEvent)="onResetAll()"
  />

  @if (loading()) {
    <p class="text-lg text-gray-600">Loading words...</p>
  } 
  
  @if (error()) {
    <p class="text-lg text-red-500">{{ error() }}</p>
  } @else if (response(); as res) {
    <app-word-info-panel
      [totalElements]="res.totalElements"
      [totalPages]="res.totalPages"
      [currentPage]="res.currentPage"
      [pageSize]="res.pageSize"
      [pageCount]="res.count"
    />

    @if (res.totalElements === 0) {
      <app-empty-state
        title="No words found"
        description="No words match the selected filters."
      />
    } @else if (res.count === 0) {
      <app-empty-state
        title="No words on this page"
        description="The requested page is outside the available results."
      />
    } @else {
      <app-word-table [words]="res.words" />
    }

    <app-pagination-container
      [currentPage]="res.currentPage"
      [totalPages]="res.totalPages"
      (pageChange)="onPageChange($event)"
    ></app-pagination-container>

    <app-query-meta-panel
      [generatedAt]="res.generatedAt"
    >
      <app-filter-meta
        [filters]="res.meta.filters"
      />
      <app-sort-meta
        [sort]="res.meta.sort"
      />
    </app-query-meta-panel>
  }
</section>
