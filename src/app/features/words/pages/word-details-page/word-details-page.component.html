<section class="p-8">
  @if (loading()) {
    <p class="text-lg text-gray-600">
      Loading word details...
    </p>
  }

  @if (error()) {
    <p class="text-lg text-red-500">
      {{ error() }}
    </p>
  }

  @if (!loading() && result()) {
    <h1 class="mb-6 text-3xl font-bold">
      {{ result()!.exists ? formatWord(result()!.lemma!) : formatWord(result()!.word) }}
    </h1>

    @if (result()!.exists) {
      <app-word-details-result
        [result]="result()!"
      />
    } @else {
      <app-empty-state
        [title]="'Word not found: ' + requestedWord()"
        description="This word does not exist in the dictionary. Check the spelling or try again later."
      />
    }
  }
</section>
