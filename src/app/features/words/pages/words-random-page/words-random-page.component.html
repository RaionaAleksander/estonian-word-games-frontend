<section class="p-8">
  <h1 class="mb-4 text-3xl font-bold">
    Random Words
  </h1>

  <app-random-words-main-panel
    [filters]="query.filters"
    [sort]="query.sort"
    [limit]="{ limit: query.limit }"
    (applyAllEvent)="onQueryChange($event)"
    (resetAllEvent)="onResetAll()"
  />

  @if (loading()) {
    <p>Loading words...</p>
  }

  @if (error()) {
    <p>{{ error() }}</p>
  }

  <app-random-words-summary-panel
    [count]="count()"
    [limit]="query.limit"
  />

  <app-random-word-cloud
    [words]="words()"
  />

  <app-query-meta-panel
    [generatedAt]="generatedAt()"
  >
    <app-filter-meta
      [filters]="meta()?.filters ?? {}"
    />
    <app-sort-meta
      [sort]="meta()?.sort ?? {}"
    />
  </app-query-meta-panel>
</section>
