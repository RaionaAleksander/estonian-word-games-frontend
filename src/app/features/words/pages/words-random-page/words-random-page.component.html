<section class="p-8">
  <h1 class="mb-4 text-3xl font-bold">
    Random Words
  </h1>

  <app-random-words-main-panel
    [filters]="query.filters"
    [sort]="query.sort"
    [limit]="{ limit: query.limit }"
    (applyAllEvent)="onQueryChange($event)"
    (resetAllEvent)="onResetAll()"
  />

  @if (loading()) {
    <p class="text-lg text-gray-600">Loading words...</p>
  }

  @if (error()) {
    <p class="text-lg text-red-500">{{ error() }}</p>
  }

  <app-random-words-summary-panel
    [count]="count()"
    [limit]="query.limit"
  />

  @if (limit() === 0) {
    <app-empty-state
      title="Limit is 0"
      description="Increase the limit to generate random words."
    />
  } @else if (count() === 0) {
    <app-empty-state
      title="No random words generated"
      description="Try adjusting filters or click Generate again."
    />
  } @else {
    <app-random-word-cloud
      [words]="words()"
    />
  }

  <app-query-meta-panel
    [generatedAt]="generatedAt()"
  >
    <app-filter-meta
      [filters]="meta()?.filters ?? {}"
    />
    <app-sort-meta
      [sort]="meta()?.sort ?? {}"
    />
  </app-query-meta-panel>
</section>
