<section class="p-8">
  <h1 class="mb-4 text-3xl font-bold">
    Random Words
  </h1>

  <app-random-words-main-panel
    [filters]="query.filters"
    [sort]="query.sort"
    [limit]="{ limit: query.limit }"
    (applyAllEvent)="onQueryChange($event)"
    (resetAllEvent)="onResetAll()"
  />

  @if (loading()) {
    <app-loading-state [message]="'Loading words...'" />
  }

  @if (error()) {
    <app-error-state [error]="error()!"/>
  } @else if (response(); as res) {
    <app-random-words-summary-panel
      [count]="res.count"
      [limit]="query.limit"
    />

    @if (res.count === 0) {
      <app-empty-state
        title="No random words generated"
        description="Try adjusting filters or click Generate again."
      />
    } @else {
      <app-random-word-cloud
        [words]="res.words"
      />
    }

    <app-query-meta-panel
      [generatedAt]="res.generatedAt"
    >
      <app-filter-meta
        [filters]="res.meta.filters"
      />
      <app-sort-meta
        [sort]="res.meta.sort"
      />
    </app-query-meta-panel>
  }
</section>
