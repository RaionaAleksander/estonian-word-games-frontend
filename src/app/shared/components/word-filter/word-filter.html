<section class="filter-panel" [formGroup]="filterForm">

  <div class="filter-header">
    <h2 class="text-xl">Word Filters</h2>

    <button
      type="button"
      class="toggle-button"
      (click)="toggleExpanded()"
    >
      @if (isExpanded()) {
        ▼
      } @else {
        ►
      }
    </button>
  </div>

  @if (isExpanded()) {
    <!-- BASIC FILTERS -->
    <div class="filter-group">
      <h3>Basic</h3>

      <div class="filter-row">
        <div class="filter-field">
          <label for="minLength">Min Length</label>
          <input id="minLength" type="number" formControlName="minLength"/>
        </div>

        <div class="filter-field">
          <label for="maxLength">Max Length</label>
          <input id="maxLength" type="number" formControlName="maxLength"/>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-field">
          <label for="startsWith">Starts With</label>
          <input id="startsWith" type="text" formControlName="startsWith"/>
        </div>

        <div class="filter-field">
          <label for="endsWith">Ends With</label>
          <input id="endsWith" type="text" formControlName="endsWith"/>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-field full-width">
          <label for="pattern">Pattern</label>
          <input id="pattern" type="text" placeholder="_a_s" formControlName="pattern"/>
        </div>
      </div>
    </div>

    <!-- LETTER FILTERS -->
    <div class="filter-group">
      <h3>Letters</h3>

      <div class="filter-row">
        <div class="filter-field">
          <label for="contains">Contains</label>
          <input id="contains" type="text" placeholder="a,b,c" formControlName="contains"/>
        </div>

        <div class="filter-field">
          <label for="notContains">Not Contains</label>
          <input id="notContains" type="text" placeholder="x,y,z" formControlName="notContains"/>
        </div>
      </div>
    </div>

    <!-- CATEGORY FILTERS -->
    <div class="filter-group">
      <h3>Categories</h3>

      <div class="filter-row">
        <div class="filter-field">
          <label for="includeCategories">Include</label>
          <input id="includeCategories" type="text" formControlName="includeCategories"/>
        </div>

        <div class="filter-field">
          <label for="excludeCategories">Exclude</label>
          <input id="excludeCategories" type="text" formControlName="excludeCategories"/>
        </div>
      </div>
    </div>

    <!-- EXCLUDED WORDS -->
    <div class="filter-group">
      <h3>Excluded Words</h3>

      <div class="filter-row">
        <div class="filter-field full-width">
          <label for="excludedWords">Excluded Words</label>
          <input
            id="excludedWords"
            type="text"
            placeholder="word1,word2"
            formControlName="excludedWords"
          />
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="filter-actions">
      <button type="button" (click)="applyFilters()">
        Apply Filters
      </button>

      <button type="button" (click)="resetFilters()">
        Reset
      </button>
    </div>
  }

</section>
