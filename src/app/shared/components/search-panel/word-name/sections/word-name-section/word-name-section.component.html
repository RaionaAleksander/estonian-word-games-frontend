<app-search-section title="Word">
  <app-section-row>
    <app-section-field label="Word *">
      <input
        type="text"
        placeholder="eesti"
        [value]="word"
        (input)="onWordChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />

      <small class="mt-2 block text-gray-500">
        Required field
      </small>

      <small class="mt-2 -mb-8 block text-gray-500">
        Enter the word to check whether it exists in the database
      </small>
    </app-section-field>
  </app-section-row>
</app-search-section>
