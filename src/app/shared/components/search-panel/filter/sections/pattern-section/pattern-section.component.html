<app-search-section title="Pattern">
  <app-section-row>
    <app-section-field label="Word Pattern">
      <input
        id="pattern"
        type="text"
        placeholder="_a_a"
        [value]="pattern ?? ''"
        (input)="onPatternChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
      <small class="mt-2">
        Use "_" for unknown letters
      </small>
    </app-section-field>
  </app-section-row>
</app-search-section>
