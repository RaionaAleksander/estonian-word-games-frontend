<app-search-section title="Boundaries">
  <app-section-row>
    <app-section-field label="Starts With">
      <input 
        id="startsWith"
        placeholder="ap"
        type="text" 
        [value]="startsWith ?? ''"
        (input)="onStartsWithChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>

    <app-section-field label="Ends With">
      <input 
        id="endsWith"
        placeholder="ik"
        type="text" 
        [value]="endsWith ?? ''"
        (input)="onEndsWithChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>
  </app-section-row>
</app-search-section>
