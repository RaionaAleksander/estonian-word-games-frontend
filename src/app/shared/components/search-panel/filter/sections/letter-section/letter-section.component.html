<app-search-section title="Letters">
  <app-section-row>
    <app-section-field label="Contains">
      <input
        id="contains"
        type="text"
        placeholder="a,b,c"
        [value]="contains?.join(', ') ?? ''"
        (input)="onContainsChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>

    <app-section-field label="Not Contains">
      <input
        id="notContains"
        type="text"
        placeholder="x,y,z"
        [value]="notContains?.join(', ') ?? ''"
        (input)="onNotContainsChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>
  </app-section-row>
</app-search-section>
