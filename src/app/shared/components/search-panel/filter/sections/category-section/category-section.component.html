<app-search-section title="Length">
  <app-section-row>
    <app-section-field label="Include">
      <input 
        id="includeCategories"
        placeholder="loomad"
        type="text" 
        [value]="includeCategories?.join(', ') ?? ''"
        (input)="onIncludeChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>

    <app-section-field label="Exclude">
      <input 
        id="excludeCategories"
        placeholder="riigid"
        type="text" 
        [value]="excludeCategories?.join(', ') ?? ''"
        (input)="onExcludeChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>
  </app-section-row>
</app-search-section>
