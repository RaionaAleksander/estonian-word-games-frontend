<app-search-section title="Length">

  <div class="section-row">

    <div class="section-field">
      <label>Excluded Words</label>
      <input 
        id="excludedWords"
        placeholder="kass"
        type="text"
        [value]="excludedWords?.join(', ') ?? ''"
        (input)="onExcludedChange($any($event.target).value)"
      />
    </div>

  </div>
</app-search-section>
