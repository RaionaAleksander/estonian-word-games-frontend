<app-search-section title="Length">
  <app-section-row>
    <app-section-field label="Min Length">
      <input
        id="minLength"
        placeholder="3"
        type="number"
        [value]="minLength ?? ''"
        (input)="onMinChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>

    <app-section-field label="Max Length">
      <input
        id="maxLength"
        placeholder="10"
        type="number"
        [value]="maxLength ?? ''"
        (input)="onMaxChange($any($event.target).value)"
        class="w-full box-border px-3 py-2 border border-gray-300 rounded-md bg-white font-inherit"
      />
    </app-section-field>
  </app-section-row>
</app-search-section>
