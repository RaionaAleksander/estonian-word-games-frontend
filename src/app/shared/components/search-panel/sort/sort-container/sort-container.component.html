<section class="sort-container">

  <app-collapsible-header
    title="Sort"
    [expanded]="isExpanded()"
    (expandedChange)="toggle()"
  />

  @if (isExpanded()) {
    <app-sort-section
      [sort]="sort.sort"
      [order]="sort.order"
      (valueChange)="updateSort($event)"
    />
  }

</section>
