<section class="sort-container">

  <div class="header">
    <h2>Sort</h2>

    <button class="toggle-button" type="button" (click)="toggle()">
      {{ expanded() ? '▼' : '►' }}
    </button>
  </div>

  @if (expanded()) {

    <app-sort-section
      [sort]="sort.sort"
      [order]="sort.order"
      (valueChange)="updateSort($event)"
    />

  }

</section>
