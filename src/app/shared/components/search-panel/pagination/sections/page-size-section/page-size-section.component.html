<app-search-section title="Page Size">
  <app-section-row>
    <app-section-field label="Items per page">
      <select
        [value]="size"
        (change)="onSizeChange($any($event.target).value)"
        class="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-gray-300"
      >
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </app-section-field>
  </app-section-row>
</app-search-section>
