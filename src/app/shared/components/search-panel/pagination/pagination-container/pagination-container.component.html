<section class="pagination-container">

  <app-collapsible-header
    title="Pagination"
    [isExpanded]="isExpanded()"
    (expandedChange)="toggle()"
  />

  @if (isExpanded()) {
    <app-page-size-section
      [size]="pageSize.size"
      (valueChange)="updateSize($event)"
    />
  }

</section>
