<section class="pagination-container">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-lg font-semibold m-0">Pagination</h2>

    <button 
      type="button" 
      (click)="toggle()"
      class="w-9 h-9 text-base font-bold p-0 border border-gray-300 bg-white rounded-md cursor-pointer hover:bg-gray-100 transition"
    >
      {{ expanded() ? '▼' : '►' }}
    </button>
  </div>

  @if (expanded()) {

    <app-page-size-section
      [size]="pageSize.size"
      (valueChange)="updateSize($event)"
    />

  }

</section>
