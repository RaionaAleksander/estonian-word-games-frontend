<div class="flex justify-center gap-4 mt-8">

  <button
    type="button"
    (click)="primaryClick.emit()"
    class="px-4 py-2 border border-gray-300 bg-white rounded-md cursor-pointer hover:bg-gray-100 transition"
  >
    {{ primaryLabel() }}
  </button>

  <button
    type="button"
    (click)="secondaryClick.emit()"
    class="px-4 py-2 border border-gray-300 bg-white rounded-md cursor-pointer hover:bg-gray-100 transition"
  >
    {{ secondaryLabel() }}
  </button>

</div>
